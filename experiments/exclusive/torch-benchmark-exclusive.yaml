apiVersion: batch/v1
kind: Job
metadata:
  name: torch-benchmark
  namespace: gpu-lab
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: benchmark
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          command:
            - python
            - -c
            - |
              import torch,time,statistics

              device="cuda"

              print("gpu_name=", torch.cuda.get_device_name(0))
              print("gpu_memory_gb=", round(torch.cuda.get_device_properties(0).total_memory/1024**3,2))

              model=torch.nn.Sequential(
                  torch.nn.Linear(8192,8192),
                  torch.nn.ReLU(),
                  torch.nn.Linear(8192,8192),
                  torch.nn.ReLU(),
                  torch.nn.Linear(8192,8192)
              ).to(device)

              x=torch.randn(4096,8192,device=device)

              times=[]

              torch.cuda.reset_peak_memory_stats()

              for i in range(100):
                  start=time.time()

                  y=model(x)
                  loss=y.mean()

                  loss.backward()

                  torch.cuda.synchronize()

                  times.append(time.time()-start)

                  model.zero_grad(set_to_none=True)

              print("avg_step_sec=", statistics.mean(times))
              print("min_step_sec=", min(times))
              print("max_step_sec=", max(times))
              print(
                  "peak_cuda_mem_gb=",
                  round(torch.cuda.max_memory_allocated()/1024**3,2)
              )
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              nvidia.com/gpu: 1